name: Build, Analyze and Scan

on:
  push:
    branches:
      - main

jobs:
  CI:
    runs-on: [Linux]
    steps:
      - name: checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: build and analysis the code
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
      # - uses: sonarsource/sonarqube-quality-gate-action@master
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: npm install dependency
        run: npm ci
      - name: trivy file scan
        run: trivy fs . > trivyfs.txt
      - name: docker build and push
        run: |
          docker build -t tic-toc-toe .
          docker tag tic-toc-toe aviseksaha31/tic-toc-toe:latest
          docker login -u ${{ vars.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          docker push aviseksaha31/tic-toc-toe:latest
      - name: trivy image scan
        run: trivy image aviseksaha31/tic-toc-toe:latest > trivyimage.txt

  CD:
   needs: CI   
   runs-on: [Linux]
   steps:
      - name: docker pull image
        run: docker pull aviseksaha31/tic-toc-toe:latest

      - name: Image scan
        run: trivy image aviseksaha31/tic-toc-toe:latest > trivyimagedeploy.txt  
  
      - name: Deploy to container
        run: docker run -d --name game -p 3000:3000 aviseksaha31/tic-toc-toe:latest

      - name: Update kubeconfig
        run: aws eks --region ap-south-1 update-kubeconfig --name EKS_CLOUD

      - name: Deploy to kubernetes
        run: kubectl apply -f deployment-service.yml        
