name: Build, Analyze and Scan

on:
  push:
    branches:
      - main

jobs:
  CI:
    if: "!contains(github.event.head_commit.message, 'skip-ci')"
    runs-on: [Linux]
    steps:
      - name: checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: build and analysis the code
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
      # - uses: sonarsource/sonarqube-quality-gate-action@master
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: npm install dependency
        run: npm ci
      - name: trivy file scan
        run: trivy fs . > trivyfs.txt
      - name: docker build and push
        run: |
          docker stop game || true
          docker rm game || true
          docker rmi tic-toc-toe || true
          docker rmi aviseksaha31/tic-toc-toe:latest || true

          docker build -t tic-toc-toe .
          docker tag tic-toc-toe aviseksaha31/tic-toc-toe:latest
          docker login -u ${{ vars.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          docker push aviseksaha31/tic-toc-toe:latest
      - name: trivy image scan
        run: trivy image aviseksaha31/tic-toc-toe:latest > trivyimage.txt

  CD:
   needs: CI   
   runs-on: [Linux]

   permissions:
    contents: write

   steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    # 🔥 THIS IS THE KEY STEP
    - name: Update deployment YAML
      run: |
        sed -i "s|image: .*|image: aviseksaha31/tic-toc-toe:latest|" deployment-service.yml

    - name: Commit and push changes
      run: |
        git config user.name "aviseksaha31"
        git config user.email "avisek.saha31@gmail.com"
        git add deployment-service.yml
        git commit -m "Update image to ${IMAGE_TAG}" || echo "No changes"
        git push

